<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Checkout | RetroClick</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
        integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Outfit:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"
        integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
    <script src="js/header.js"></script>
    <style>
        /* Checkout form validation styles */
        .checkout-form input.is-invalid,
        .checkout-form select.is-invalid {
            border-color: var(--rust) !important;
            background: rgba(181, 72, 31, 0.05) !important;
            box-shadow: 0 0 0 0.2rem rgba(181, 72, 31, 0.15) !important;
        }

        .field-error {
            display: block;
            color: var(--rust);
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.4rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            position: relative;
        }

        .form-group.has-error input,
        .form-group.has-error select {
            border-color: var(--rust) !important;
            background: rgba(181, 72, 31, 0.05) !important;
        }

        .checkout-step-panel {
            display: none;
        }

        .checkout-step-panel.is-active {
            display: block;
        }

        .payment-option-grid {
            display: grid;
            gap: 0.85rem;
            margin-top: 0.75rem;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(117, 66, 36, 0.18);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.52);
            cursor: pointer;
        }

        .payment-option input {
            accent-color: var(--bordeaux);
        }

        .review-receipt {
            padding: 1.25rem;
            border: 1px solid rgba(117, 66, 36, 0.15);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.55);
        }

        .vintage-receipt {
            max-width: 520px;
            margin: 0 auto;
            padding: 1.1rem 1rem 1.2rem;
            color: #3c2a21;
            background:
                radial-gradient(circle at 10% 10%, rgba(255,255,255,0.55) 0, rgba(255,255,255,0) 40%),
                radial-gradient(circle at 90% 20%, rgba(255,255,255,0.4) 0, rgba(255,255,255,0) 45%),
                repeating-linear-gradient(0deg, rgba(90, 62, 38, 0.035) 0 2px, rgba(90, 62, 38, 0) 2px 4px),
                #f3ead7;
            border: 1px solid rgba(92, 63, 38, 0.25);
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(64, 35, 22, 0.15);
            font-family: "Outfit", sans-serif;
        }

        .receipt-topline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.84rem;
            letter-spacing: 0.08em;
            font-weight: 800;
            color: #972f2f;
            text-transform: uppercase;
        }

        .receipt-brand {
            margin: 0.65rem 0 0;
            text-align: center;
            font-family: "Playfair Display", serif;
            font-style: italic;
            font-size: 2rem;
            color: #a3232f;
            line-height: 1.05;
        }

        .receipt-tagline {
            margin: 0.12rem 0 0.6rem;
            text-align: center;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.68rem;
            color: #6a4b3a;
            font-weight: 700;
        }

        .receipt-divider {
            border-top: 2px dashed rgba(90, 63, 38, 0.46);
            margin: 0.6rem 0;
        }

        .receipt-meta-row {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            align-items: baseline;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .receipt-meta-row span:first-child {
            font-weight: 800;
            color: #4f392b;
        }

        .receipt-meta-row span:last-child {
            text-align: right;
            color: #2e1f18;
            font-weight: 600;
        }

        .receipt-address {
            font-size: 0.75rem;
            color: #5c4538;
            line-height: 1.4;
            margin-top: 0.2rem;
        }

        .receipt-items-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .receipt-items-list li {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.25rem 0.8rem;
            padding: 0.45rem 0;
            border-bottom: 1px dotted rgba(90, 63, 38, 0.35);
        }

        .receipt-items-list li:last-child {
            border-bottom: 0;
        }

        .receipt-item-name {
            grid-column: 1 / 2;
            font-size: 0.9rem;
            font-weight: 700;
            color: #34241c;
            line-height: 1.2;
            word-break: break-word;
        }

        .receipt-item-meta {
            grid-column: 1 / 2;
            font-size: 0.74rem;
            color: #6b5142;
        }

        .receipt-item-total {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            align-self: center;
            font-size: 0.93rem;
            font-weight: 800;
            color: #3a2a21;
        }

        .receipt-amount-row,
        .receipt-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.83rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0.15rem 0;
        }

        .receipt-total-row {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 2px dashed rgba(90, 63, 38, 0.5);
            font-size: 1.2rem;
            font-weight: 900;
            color: #2b1d17;
        }

        .receipt-thanks {
            margin: 0.8rem 0 0;
            text-align: center;
            font-family: "Caveat", cursive;
            font-size: 2rem;
            font-weight: 700;
            color: #b02b3b;
            line-height: 1;
        }

        .receipt-preview-note {
            margin: 0.3rem 0 0;
            text-align: center;
            font-size: 0.7rem;
            color: #7a6457;
            letter-spacing: 0.03em;
        }

        .swal-receipt-wrap {
            text-align: left;
            max-height: 60vh;
            overflow: auto;
            padding-right: 0.2rem;
        }

        .receipt-swal-popup {
            width: min(760px, 96vw) !important;
        }

        @media (max-width: 576px) {
            .vintage-receipt {
                padding: 0.95rem 0.85rem 1.05rem;
                border-radius: 10px;
            }

            .receipt-brand {
                font-size: 1.75rem;
            }

            .receipt-total-row {
                font-size: 1.05rem;
            }

            .receipt-thanks {
                font-size: 1.7rem;
            }
        }

        .receipt-section {
            margin-top: 1rem;
        }

        .receipt-section h4 {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--bordeaux);
        }

        .receipt-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .receipt-list li {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.45rem 0;
            border-bottom: 1px dashed rgba(117, 66, 36, 0.18);
        }

        .receipt-list li:last-child {
            border-bottom: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
        integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/checkout.js"></script>
</head>

<body>
    <div id="header"></div>

    <div class="container my-5">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--brass);">
            <a href="cart.html" style="color: var(--bordeaux); text-decoration: none; font-weight: 700; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-arrow-left"></i> Back to Cart
            </a>
            <h1 style="margin: 0; font-family: var(--font-display); font-size: 2rem; letter-spacing: 0.03em; color: var(--ink);">Checkout</h1>
            <div style="width: 100px;"></div>
        </div>

        <div class="checkout-steps">
            <div class="checkout-step is-current"><span class="num">1</span> Shipping</div>
            <span class="checkout-step-sep" aria-hidden="true"></span>
            <div class="checkout-step"><span class="num">2</span> Payment</div>
            <span class="checkout-step-sep" aria-hidden="true"></span>
            <div class="checkout-step"><span class="num">3</span> Review</div>
        </div>

        <div class="checkout-layout">
            <div class="checkout-main">
                <form class="checkout-form" id="shippingForm">
                    <div class="checkout-step-panel is-active" id="checkoutStepShipping">
                        <div class="checkout-form-section">
                            <span class="section-eyebrow left">Contact Information</span>
                            <div class="form-group">
                                <label for="checkoutEmail">Email Address</label>
                                <input type="email" id="checkoutEmail" name="email" placeholder="youremail@example.com" required>
                            </div>
                        </div>

                        <div class="checkout-form-section">
                            <span class="section-eyebrow left">Shipping Address</span>
                            <div class="form-group">
                                <label for="checkoutFullName">Full Name</label>
                                <input type="text" id="checkoutFullName" name="fullname" placeholder="Full name" required>
                            </div>
                            <div class="form-group">
                                <label for="checkoutAddress1">Address Line 1</label>
                                <input type="text" id="checkoutAddress1" name="address1" placeholder="House number and street name" required>
                            </div>
                            <div class="form-group">
                                <label for="checkoutAddress2">Address Line 2 (Optional)</label>
                                <input type="text" id="checkoutAddress2" name="address2" placeholder="Apartment, suite, etc.">
                            </div>
                            <div class="form-row">
                                <div class="form-group" style="flex: 1;">
                                    <label for="checkoutCity">City</label>
                                    <input type="text" id="checkoutCity" name="city" required>
                                </div>
                                <div class="form-group" style="flex: 1;">
                                    <label for="checkoutProvince">State / Province</label>
                                    <input type="text" id="checkoutProvince" name="province" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group" style="flex: 1;">
                                    <label for="checkoutZip">ZIP / Postal Code</label>
                                    <input type="text" id="checkoutZip" name="zip" required>
                                </div>
                                <div class="form-group" style="flex: 1;">
                                    <label for="checkoutCountry">Country</label>
                                    <select id="checkoutCountry" name="country" required>
                                        <option value="">Select Country</option>
                                        <option value="PH">Philippines</option>
                                        <option value="US">United States</option>
                                        <option value="JP">Japan</option>
                                        <option value="SG">Singapore</option>
                                        <option value="OTHER">Other</option>
                                    </select>
                                </div>
                            </div>
                            
                        </div>

                        <button type="button" id="continuePaymentBtn" class="btn-primary-custom" style="width: 100%; margin-top: 1.5rem;">
                            Continue to Payment →
                        </button>
                    </div>

                    <div class="checkout-step-panel" id="checkoutStepPayment">
                        <div class="checkout-form-section">
                            <span class="section-eyebrow left">Payment Method</span>
                            <p style="margin: 0 0 0.85rem; color: var(--muted);">Choose how you want to pay for this order.</p>
                            <div class="payment-option-grid">
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="COD" checked>
                                    <span>
                                        <strong>Cash on Delivery</strong><br>
                                        <small>Pay when the item arrives.</small>
                                    </span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="GCash">
                                    <span>
                                        <strong>GCash</strong><br>
                                        <small>Pay using your GCash account.</small>
                                    </span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="Card">
                                    <span>
                                        <strong>Card</strong><br>
                                        <small>Debit or credit card.</small>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                            <button type="button" id="backToShippingBtn" class="btn-secondary-custom" style="flex:1;">← Back</button>
                            <button type="button" id="continueReviewBtn" class="btn-primary-custom" style="flex:1;">Review Order →</button>
                        </div>
                    </div>

                    <div class="checkout-step-panel" id="checkoutStepReview">
                        <div class="checkout-form-section">
                            <span class="section-eyebrow left">Review & Receipt</span>
                            <div class="review-receipt" id="reviewReceipt">
                                <!-- populated by JS -->
                            </div>
                        </div>

                        <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                            <button type="button" id="backToPaymentBtn" class="btn-secondary-custom" style="flex:1;">← Back</button>
                            <button type="button" id="placeOrderBtn" class="btn-primary-custom" style="flex:1;">Place Order</button>
                        </div>
                    </div>
                </form>
            </div>

            <aside class="checkout-summary">
                <div class="summary-title">Order Summary</div>

                <div class="checkout-summary-items" id="checkoutSummaryItems">
                    <!-- Populated by JS -->
                </div>

                <div class="summary-row">
                    <span class="label">Subtotal</span>
                    <span class="value" id="checkoutSubtotal">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span class="label">Shipping</span>
                    <span class="value" id="checkoutShipping">₱150.00</span>
                </div>
                <div class="summary-row discount" id="checkoutDiscountRow" style="display: none;">
                    <span class="label">Discount</span>
                    <span class="value" id="checkoutDiscount">−₱0.00</span>
                </div>
                <div class="summary-row total-row">
                    <span class="label">Total</span>
                    <span class="value" id="checkoutTotal">₱0.00</span>
                </div>

                <div class="summary-trust">
                    <div class="summary-trust-item"><i class="fas fa-lock"></i>Secure Checkout</div>
                    <div class="summary-trust-item"><i class="fas fa-truck-fast"></i>Insured Shipping</div>
                    <div class="summary-trust-item"><i class="fas fa-rotate-left"></i>Easy Returns</div>
                </div>
            </aside>
        </div>
    </div>

    <div id="footer"></div>
</body>

</html>
