<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Latest compiled and minified CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Outfit:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap">
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://code.jquery.com/jquery-3.6.4.min.js"
      integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8="
      crossorigin="anonymous"
    ></script>
    <script src="js/header.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
      integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script type="text/javascript" src="js/home.js"></script>
    <title>Shop | RetroClick</title>
  </head>
  <body>
    <div id="header"></div>

    <section class="shop-banner">
      <div class="container">
        <span class="section-eyebrow">The Full Collection</span>
        <h1>Shop Products</h1>
        <p>Every camera, lens, and roll of film &mdash; hand-picked and ready for a new home.</p>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <div class="container">
      <div class="shop-toolbar">
        <div class="shop-tabs" role="tablist" aria-label="Browse mode">
          <button type="button" class="active">Shop</button>
          <button type="button">Discovery</button>
        </div>
        <div class="shop-tabs shop-tabs--brand" id="brandFilterTabs" role="tablist" aria-label="Filter by brand">
          <button type="button" class="active" data-brand="">Everything</button>
          <button type="button" data-brand="Canon">Canon</button>
          <button type="button" data-brand="Nikon">Nikon</button>
          <button type="button" data-brand="Leica">Leica</button>
        </div>
        <div class="search-box">
          <input type="text" id="shopSearchInput" placeholder="Search by brand, model, or condition..." autocomplete="off">
          <button id="shopSearchBtn" type="button"><i class="fas fa-search"></i></button>
          <div id="shopSearchSuggestions" class="search-suggestions" hidden></div>
        </div>
      </div>

      <div id="items"></div>
    </div>

    <div id="footer"></div>

    <script>
      // Cosmetic-only tab toggling. If home.js exposes a brand-filter function
      // (commonly named filterByBrand or filterProducts), call it; otherwise
      // this just updates the active state visually without touching #items.
      document.querySelectorAll('.shop-tabs').forEach(function (group) {
        group.querySelectorAll('button').forEach(function (btn) {
          btn.addEventListener('click', function () {
            group.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');

            const brand = btn.getAttribute('data-brand');
            if (brand === null) return; // not a brand-filter button (e.g. Shop/Discovery tab)

            if (typeof window.filterByBrand === 'function') {
              window.filterByBrand(brand);
            } else if (typeof window.filterProducts === 'function') {
              window.filterProducts(brand);
            }
            // If neither exists, the buttons remain a visual-only toggle for now.
          });
        });
      });

      // -- Search filter powered by the public items API and autocomplete --
      (function () {
        const itemsRoot = document.getElementById('items');
        const searchInput = document.getElementById('shopSearchInput');
        const searchBtn = document.getElementById('shopSearchBtn');
        const suggestions = document.getElementById('shopSearchSuggestions');
        if (!itemsRoot || !searchInput) return;

        const API_URL = 'http://localhost:3000/api/v1';

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function renderSuggestions(items, query) {
          if (!suggestions) return;
          if (!query) {
            suggestions.innerHTML = '';
            suggestions.hidden = true;
            return;
          }

          const list = (items || []).slice(0, 6);
          if (!list.length) {
            suggestions.innerHTML = '';
            suggestions.hidden = true;
            return;
          }

          suggestions.innerHTML = list.map(function (item) {
            const title = `${item.camera_brand || 'Vintage'} ${item.camera_model || ''}`.trim();
            return `<button type="button" class="search-suggestion-item" data-query="${escapeHtml(title)}">
              <span>
                <div class="search-suggestion-title">${escapeHtml(title)}</div>
                <div class="search-suggestion-meta">${escapeHtml(item.description || '')}</div>
              </span>
              <span class="search-suggestion-meta">₱${Number(item.sell_price || 0).toFixed(2)}</span>
            </button>`;
          }).join('');
          suggestions.hidden = false;
        }

        function applyFilter(query) {
          const normalizedQuery = (query || searchInput.value).trim().toLowerCase();
          if (!normalizedQuery) {
            suggestions.innerHTML = '';
            suggestions.hidden = true;
            if (itemsRoot) {
              itemsRoot.querySelectorAll('.product-card').forEach(function (card) {
                const wrapper = card.closest('[class*="col-"]') || card;
                wrapper.style.display = '';
              });
            }
            return;
          }

          fetch(`${API_URL}/public/items/search?q=${encodeURIComponent(normalizedQuery)}`)
            .then(function (response) { return response.json(); })
            .then(function (data) {
              const items = data.rows || [];
              renderSuggestions(items, normalizedQuery);
              const matches = new Set(items.map(function (item) { return String(item.item_id); }));
              const cards = itemsRoot.querySelectorAll('.product-card');
              cards.forEach(function (card) {
                const itemId = card.getAttribute('data-item-id');
                const wrapper = card.closest('[class*="col-"]') || card;
                wrapper.style.display = matches.has(String(itemId)) ? '' : 'none';
              });
            })
            .catch(function () {
              if (suggestions) {
                suggestions.innerHTML = '';
                suggestions.hidden = true;
              }
            });
        }

        searchInput.addEventListener('input', function () { applyFilter(searchInput.value); });
        searchInput.addEventListener('keypress', function (e) {
          if (e.which === 13) { e.preventDefault(); applyFilter(searchInput.value); }
        });
        if (searchBtn) {
          searchBtn.addEventListener('click', function (e) { e.preventDefault(); applyFilter(searchInput.value); });
        }

        document.addEventListener('click', function (e) {
          if (!e.target.closest('.search-box')) {
            if (suggestions) {
              suggestions.innerHTML = '';
              suggestions.hidden = true;
            }
          }
        });

        document.addEventListener('click', function (e) {
          const suggestion = e.target.closest('.search-suggestion-item');
          if (!suggestion) return;
          searchInput.value = suggestion.getAttribute('data-query');
          applyFilter(searchInput.value);
        });
      })();
    </script>
  </body>
</html>
