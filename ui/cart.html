<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cart | RetroClick</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
        integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Outfit:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="header"></div>

    <div class="container my-5">
        <div class="cart-page-title">
            <h1>Your Cart</h1>
            <span class="cart-count-pill" id="cartCountPill">0 items</span>
        </div>

        <div class="cart-layout">
            <div class="cart-main">
                <div class="table-responsive">
                    <div id="cartTable"></div>
                </div>

                <a href="home.html" class="btn-secondary-custom mt-3">Continue Shopping</a>
            </div>

            <aside class="order-summary">
                <div class="summary-title">Order Summary</div>

                <div class="summary-voucher">
                    <input type="text" id="voucherInput" placeholder="Discount voucher">
                    <button type="button" id="voucherApplyBtn" class="btn-secondary-custom">Apply</button>
                </div>
                <div class="summary-voucher-msg" id="voucherMsg"></div>

                <div style="border-top: 2px solid var(--line); padding-top: 1rem; margin-top: 1rem;">
                    <div class="summary-row">
                        <span class="label">Subtotal</span>
                        <span class="value" id="summarySubtotal">₱0.00</span>
                    </div>
                    <div class="summary-row discount" id="summaryDiscountRow" style="display:none;">
                        <span class="label">Discount</span>
                        <span class="value" id="summaryDiscount">−₱0.00</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">Delivery Fee</span>
                        <span class="value" id="summaryShipping">₱150.00</span>
                    </div>
                    <div class="summary-row total-row">
                        <span class="label">Total</span>
                        <span class="value" id="summaryTotal">₱0.00</span>
                    </div>
                </div>

                <button id="checkoutBtn" type="button" class="summary-cta">Checkout Now</button>

                <div class="summary-warranty">
                    <i class="fas fa-circle-check"></i>
                    <span>90-day authenticity guarantee on every camera body we ship.</span>
                </div>

                <div class="summary-trust">
                    <div class="summary-trust-item"><i class="fas fa-lock"></i>Secure Checkout</div>
                    <div class="summary-trust-item"><i class="fas fa-truck-fast"></i>Insured Shipping</div>
                    <div class="summary-trust-item"><i class="fas fa-rotate-left"></i>Easy Returns</div>
                </div>
            </aside>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"
        integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
    <script src="js/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
        integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/cart.js"></script>
</body>

</html>
